name: Block on fixup commits

on: pull_request

permissions:
  pull-requests: read

jobs:
  message:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
